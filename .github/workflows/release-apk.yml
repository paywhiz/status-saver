name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build Android release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Build universal release APK
        run: flutter build apk --release

      - name: Build per-ABI release APKs
        run: flutter build apk --release --split-per-abi

      - name: Stage APKs with descriptive names
        run: |
          set -euo pipefail
          mkdir -p out
          short_sha=$(git rev-parse --short HEAD)
          ref="${GITHUB_REF_NAME//\//-}"
          cp build/app/outputs/flutter-apk/app-release.apk \
             "out/status-saver-${ref}-${short_sha}-universal.apk"
          for abi in armeabi-v7a arm64-v8a x86_64; do
            cp "build/app/outputs/flutter-apk/app-${abi}-release.apk" \
               "out/status-saver-${ref}-${short_sha}-${abi}.apk"
          done
          ls -lh out

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: status-saver-apks
          path: out/*.apk
          retention-days: 30

      - name: Attach APKs to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*.apk
          generate_release_notes: true
          draft: false
