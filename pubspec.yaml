name: status_saver
description: A free, ad-free WhatsApp Status Saver for Android and iOS.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2

  # File / storage
  path_provider: ^2.1.4
  saf_util: ^2.1.0
  shared_preferences: ^2.3.2

  # Media
  video_player: ^2.9.2
  image_gallery_saver_plus: ^4.0.1

  # Sharing / iOS share-extension ingress / Files import
  share_plus: ^12.0.2
  receive_sharing_intent: ^1.8.0
  file_picker: ^11.0.2

  # Misc
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

flutter_launcher_icons:
  image_path: assets/icon/icon.png
  android: true
  adaptive_icon_background: "#128C7E"
  adaptive_icon_foreground: assets/icon/icon_foreground.png
  ios: true
  remove_alpha_ios: true
